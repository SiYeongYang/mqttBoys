name: Release Windows executable

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\MqttPulse.slnx

      - name: Test
        run: dotnet test .\MqttPulse.Tests\MqttPulse.Tests.csproj -c Release --no-restore

      - name: Publish single executable
        run: >-
          dotnet publish .\MqttPulse.App\MqttPulse.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          --no-restore
          -o .\publish
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = ".\publish\mqttBoys.exe"
          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $asset --verify-tag --generate-notes --title "mqttBoys $tag" --repo $env:GITHUB_REPOSITORY
          }
